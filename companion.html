<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b0e1a" />
    <title>Yuki · Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/companion.css" />
    <link rel="stylesheet" href="css/widget.css" />
  </head>
  <body class="companion-mode">
    <div class="desktop-note">
      <div class="phone-icon">📱</div>
      <h2>Yuki companion view</h2>
      <p>
        A dedicated space to talk with Yuki — no casino. Open on your phone or
        use DevTools device toolbar for the best experience.
      </p>
      <p class="desktop-link"><a href="index.html">← Back to roulette demo</a></p>
    </div>

    <div class="device-frame">
      <main class="phone companion-phone">
        <header class="companion-header">
          <div class="companion-brand">
            <span class="brand-dot"></span>
            <span class="companion-name">Yuki</span>
          </div>
          <span class="companion-tag">Companion</span>
        </header>

        <div class="companion-scene">
          <div class="companion-bg" aria-hidden="true"></div>
          <div id="yuki-widget" class="companion-widget" aria-label="Yuki companion"></div>
        </div>

        <footer class="companion-footer">
          <p>Tap <strong>Talk</strong> to start a voice chat</p>
        </footer>
      </main>
    </div>

    <script src="js/runtime.js"></script>
    <script src="js/config.js"></script>
    <script>window.YUKI_CONFIG.MODE = "companion";</script>
    <script src="js/eventBus.js"></script>
    <script src="js/memory.js"></script>
    <script src="js/character.js"></script>
    <script src="js/sessionConfig.js"></script>
    <script src="js/voice.js"></script>
    <script src="js/widget.js"></script>
  </body>
</html>
